[build]
  command = "node scripts/translate.mjs && node scripts/transform-products.mjs && node scripts/transform-content.mjs && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
