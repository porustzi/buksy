backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: public/uploads
public_folder: /uploads

collections:
  # === ГОЛОВНА ===
  - name: "homepage"
    label: "🏠 Головна"
    folder: "content/pages/homepage"
    create: false
    delete: false
    extension: json
    format: json
    editor: { preview: false }
    fields:
      - label: "HERO — теглайн"
        name: hero
        widget: object
        fields:
          - { label: "Теглайн", name: tagline, widget: string }
          - { label: "Заголовок 1", name: title1, widget: string }
          - { label: "Заголовок 2 (червоний)", name: title2, widget: string }
          - { label: "Опис", name: description, widget: text }
          - { label: "Текст кнопки 1 (Магазин)", name: shopNow, widget: string }
          - { label: "Текст кнопки 2 (Про нас)", name: ourStory, widget: string }
          - { label: "Фонове зображення", name: image, widget: image }
          - { label: "Текст SCROLL", name: scroll, widget: string }
      - label: "FEATURED — рекомендоване"
        name: featured
        widget: object
        fields:
          - { label: "Теглайн", name: tagline, widget: string }
          - { label: "Заголовок", name: title, widget: string }
          - { label: "Кнопка «Все»", name: viewAll, widget: string }
      - label: "ФІЛОСОФІЯ"
        name: philosophy
        widget: object
        fields:
          - { label: "Теглайн", name: tagline, widget: string }
          - { label: "Заголовок 1", name: title1, widget: string }
          - { label: "Заголовок 2 (червоний)", name: title2, widget: string }
          - { label: "Текст 1", name: text1, widget: text }
          - { label: "Текст 2", name: text2, widget: text }
          - { label: "Текст 3", name: text3, widget: text }
          - { label: "Текст кнопки", name: button, widget: string }
          - { label: "Зображення", name: image, widget: image }
      - label: "БЕСТСЕЛЕРИ"
        name: bestsellers
        widget: object
        fields:
          - { label: "Теглайн", name: tagline, widget: string }
          - { label: "Заголовок", name: title, widget: string }
      - label: "КОЛЕКЦІЇ"
        name: collections
        widget: object
        fields:
          - { label: "Теглайн", name: tagline, widget: string }
          - { label: "Заголовок", name: title, widget: string }

  # === ПРО НАС ===
  - name: "about"
    label: "ℹ️ Про нас"
    folder: "content/pages/about"
    create: false
    delete: false
    extension: json
    format: json
    editor: { preview: false }
    fields:
      - label: "HERO"
        name: hero
        widget: object
        fields:
          - { label: "Теглайн", name: tagline, widget: string }
          - { label: "Заголовок 1", name: title1, widget: string }
          - { label: "Заголовок 2 (червоний)", name: title2, widget: string }
          - { label: "Зображення", name: image, widget: image }
      - label: "ЦИТАТА"
        name: philosophy
        widget: object
        fields:
          - { label: "Текст цитати", name: quote, widget: text }
          - { label: "Автор", name: author, widget: string }
          - { label: "Зображення", name: image, widget: image }
      - label: "ЦІННОСТІ"
        name: values
        widget: object
        fields:
          - { label: "Теглайн секції", name: tagline, widget: string }
          - { label: "Заголовок секції", name: title, widget: string }
          - label: "Перелік цінностей"
            name: items
            widget: list
            fields:
              - { label: "Заголовок", name: title, widget: string }
              - { label: "Опис", name: description, widget: text }
      - label: "АТЕЛЬЄ"
        name: atelier
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - { label: "Опис 1", name: description1, widget: text }
          - { label: "Опис 2", name: description2, widget: text }
          - { label: "Зображення", name: image, widget: image }
      - label: "ТАЙМЛАЙН"
        name: timeline
        widget: object
        fields:
          - { label: "Теглайн секції", name: tagline, widget: string }
          - { label: "Заголовок секції", name: title, widget: string }
          - label: "Події"
            name: events
            widget: list
            fields:
              - { label: "Рік", name: year, widget: string }
              - { label: "Опис", name: event, widget: string }
      - label: "CTA (заклик до дії)"
        name: cta
        widget: object
        fields:
          - { label: "Заголовок 1", name: title1, widget: string }
          - { label: "Заголовок 2 (червоний)", name: title2, widget: string }
          - { label: "Опис", name: description, widget: text }
          - { label: "Текст кнопки", name: button, widget: string }

  # === РЕДАКЦІЯ ===
  - name: "editorial"
    label: "📸 Редакція"
    folder: "content/pages/editorial"
    create: false
    delete: false
    extension: json
    format: json
    editor: { preview: false }
    fields:
      - label: "HERO"
        name: hero
        widget: object
        fields:
          - { label: "Підзаголовок", name: subtitle, widget: string }
          - { label: "Заголовок", name: title, widget: string }
          - { label: "Опис", name: description, widget: text }
          - { label: "Зображення", name: image, widget: image }
          - { label: "Текст кнопки", name: button, widget: string }
          - { label: "SCROLL текст", name: scroll, widget: string }
      - label: "ЛУКБУК"
        name: lookbook
        widget: list
        fields:
          - { label: "Зображення", name: image, widget: image }
          - { label: "Підпис", name: caption, widget: string }
      - label: "ЗА КАДРОМ"
        name: behindScenes
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - { label: "Опис", name: description, widget: text }
          - { label: "Зображення", name: image, widget: image }
          - { label: "Текст кнопки", name: button, widget: string }
      - label: "ФІНАЛЬНА СЕКЦІЯ"
        name: finale
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - { label: "Зображення", name: image, widget: image }
          - { label: "Текст кнопки", name: button, widget: string }

  # === КОНТАКТИ ===
  - name: "contact"
    label: "✉️ Контакти"
    folder: "content/pages/contact"
    create: false
    delete: false
    extension: json
    format: json
    editor: { preview: false }
    fields:
      - label: "HERO"
        name: hero
        widget: object
        fields:
          - { label: "Теглайн", name: tagline, widget: string }
          - { label: "Заголовок", name: title, widget: string }
      - label: "ФОРМА"
        name: form
        widget: object
        fields:
          - { label: "Заголовок форми", name: title, widget: string }
          - { label: "Ім'я — лейбл", name: nameLabel, widget: string }
          - { label: "Ім'я — placeholder", name: namePlaceholder, widget: string }
          - { label: "Email — лейбл", name: emailLabel, widget: string }
          - { label: "Email — placeholder", name: emailPlaceholder, widget: string }
          - { label: "Тема — лейбл", name: subjectLabel, widget: string }
          - { label: "Тема — placeholder", name: subjectPlaceholder, widget: string }
          - label: "Теми (варіанти вибору)"
            name: subjectOptions
            widget: list
            fields:
              - { label: "Значення (латиниця)", name: value, widget: string }
              - { label: "Назва теми", name: label, widget: string }
          - { label: "Повідомлення — лейбл", name: messageLabel, widget: string }
          - { label: "Повідомлення — placeholder", name: messagePlaceholder, widget: string }
          - { label: "Текст кнопки", name: submitButton, widget: string }
          - { label: "Успіх — заголовок", name: successTitle, widget: string }
          - { label: "Успіх — текст", name: successText, widget: string }
      - label: "КОНТАКТНІ ДАНІ"
        name: info
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - { label: "Email (до @)", name: emailUser, widget: string }
          - { label: "Email (домен)", name: emailDomain, widget: string }
          - { label: "Телефон", name: phone, widget: string }
          - { label: "Адреса студії", name: studio, widget: text }
          - { label: "Email лейбл", name: emailLabel, widget: string }
          - { label: "Телефон лейбл", name: phoneLabel, widget: string }
          - { label: "Студія лейбл", name: studioLabel, widget: string }
      - label: "СОЦМЕРЕЖІ"
        name: social
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - { label: "Instagram URL", name: instagram, widget: string }
          - { label: "TikTok URL", name: tiktok, widget: string }
          - { label: "Telegram URL", name: telegram, widget: string }
      - label: "FAQ"
        name: faq
        widget: object
        fields:
          - { label: "Теглайн секції", name: tagline, widget: string }
          - { label: "Заголовок секції", name: title, widget: string }
          - label: "Питання"
            name: items
            widget: list
            fields:
              - { label: "Питання", name: question, widget: string }
              - { label: "Відповідь", name: answer, widget: text }

  # === ФУТЕР ===
  - name: "footer"
    label: "⬇️ Футер"
    folder: "content/pages/footer"
    create: false
    delete: false
    extension: json
    format: json
    editor: { preview: false }
    fields:
      - label: "Telegram розсилка"
        name: newsletter
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - { label: "Текст кнопки", name: tg, widget: string }
          - { label: "Опис", name: description, widget: text }
          - { label: "Telegram URL", name: telegramUrl, widget: string }
      - label: "Бренд"
        name: brand
        widget: object
        fields:
          - { label: "Опис бренду", name: description, widget: text }
      - label: "Соцмережі"
        name: social
        widget: object
        fields:
          - { label: "Instagram URL", name: instagram, widget: string }
          - { label: "TikTok URL", name: tiktok, widget: string }
          - { label: "Telegram URL", name: telegram, widget: string }
      - label: "Навігація"
        name: navigation
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - label: "Посилання"
            name: links
            widget: list
            fields:
              - { label: "Назва", name: name, widget: string }
              - { label: "URL", name: href, widget: string }
      - label: "Підтримка"
        name: support
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - label: "Посилання"
            name: links
            widget: list
            fields:
              - { label: "Назва", name: name, widget: string }
              - { label: "URL", name: href, widget: string }
      - label: "Правова"
        name: legal
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - label: "Посилання"
            name: links
            widget: list
            fields:
              - { label: "Назва", name: name, widget: string }
              - { label: "URL", name: href, widget: string }
      - label: "Копірайт"
        name: copyright
        widget: object
        fields:
          - { label: "Текст прав", name: allRights, widget: string }

  # === ТОВАРИ ===
  - name: "products"
    label: "🛒 Товари"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    summary: "{{name}} — ₴{{price}}"
    identifier_field: "slug"
    editor: { preview: false }
    fields:
      - { label: "ID", name: id, widget: string }
      - { label: "Назва", name: name, widget: string }
      - { label: "Slug (URL)", name: slug, widget: string }
      - { label: "Ціна ₴", name: price, widget: number, value_type: float }
      - { label: "Ціна без знижки", name: originalPrice, widget: number, value_type: float, required: false }
      - { label: "Категорія", name: category, widget: select, options: ["hoodies", "t-shirts", "jackets", "pants", "accessories", "footwear"] }
      - { label: "Зображення 1", name: image1, widget: image }
      - { label: "Зображення 2", name: image2, widget: image }
      - { label: "Зображення 3", name: image3, widget: image }
      - label: "Розміри"
        name: sizes
        widget: list
        fields:
          - { label: "Розмір", name: name, widget: string }
          - { label: "В наявності", name: available, widget: boolean, default: true }
      - { label: "В наявності", name: inStock, widget: boolean, default: true }
      - { label: "Кількість на складі", name: stock, widget: number, value_type: int, default: 99, required: false }
      - { label: "Новинка", name: isNew, widget: boolean, default: false, required: false }
      - { label: "В обраному", name: isFeatured, widget: boolean, default: false, required: false }
      - { label: "Бестселер", name: isBestseller, widget: boolean, default: false, required: false }
      - { label: "Рейтинг", name: rating, widget: number, value_type: float, default: 0, min: 0, max: 5, step: 0.1 }
      - { label: "Короткий опис", name: shortDescription, widget: text }
      - { label: "Повний опис", name: description, widget: text }
      - label: "Деталі"
        name: details
        widget: list
        required: false
        field: { label: "Деталь", name: detail, widget: string }
      - label: "Догляд"
        name: care
        widget: list
        required: false
        field: { label: "Інструкція", name: instruction, widget: string }
      - label: "Відгуки"
        name: reviews
        widget: list
        required: false
        fields:
          - { label: "ID", name: id, widget: string }
          - { label: "Автор", name: author, widget: string }
          - { label: "Рейтинг", name: rating, widget: number, value_type: float, min: 1, max: 5, step: 1, default: 5 }
          - { label: "Заголовок", name: title, widget: string }
          - { label: "Текст", name: content, widget: text }
          - { label: "Дата", name: date, widget: date }
          - { label: "Перевірений покупець", name: verified, widget: boolean, default: true }

  # === ІНФО-СТОРІНКИ ===
  - name: "info-pages"
    label: "📋 Інфо-сторінки"
    editor: { preview: false }
    files:
      - file: "content/pages/shipping/shipping.json"
        label: "🚚 Доставка та повернення"
        name: "shipping"
        fields:
          - { label: "Заголовок сторінки", name: title, widget: string }
          - { label: "Текст", name: content, widget: text }
      - file: "content/pages/faq/faq.json"
        label: "❓ FAQ"
        name: "faq"
        fields:
          - { label: "Заголовок сторінки", name: title, widget: string }
          - { label: "Текст", name: content, widget: text }
      - file: "content/pages/track/track.json"
        label: "📦 Відстежити замовлення"
        name: "track"
        fields:
          - { label: "Заголовок сторінки", name: title, widget: string }
          - { label: "Текст", name: content, widget: text }
      - file: "content/pages/privacy/privacy.json"
        label: "🔒 Політика конфіденційності"
        name: "privacy"
        fields:
          - { label: "Заголовок сторінки", name: title, widget: string }
          - { label: "Текст", name: content, widget: text }
      - file: "content/pages/terms/terms.json"
        label: "📜 Умови використання"
        name: "terms"
        fields:
          - { label: "Заголовок сторінки", name: title, widget: string }
          - { label: "Текст", name: content, widget: text }
      - file: "content/pages/cookies/cookies.json"
        label: "🍪 Cookie політика"
        name: "cookies"
        fields:
          - { label: "Заголовок сторінки", name: title, widget: string }
          - { label: "Текст", name: content, widget: text }
